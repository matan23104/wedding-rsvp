<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מזל טוב למתן ופריאל</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@700&family=Heebo:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --gold: #8B6914;
            --blue: #7BA7BC;
            --cream: #F5F0E8;
            --text: #333;
        }

        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--cream);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            max-width: 500px;
            width: 90%;
            margin: 20px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid var(--gold);
        }

        h1, h2 { font-family: 'Frank Ruhl Libre', serif; color: var(--gold); }

        .couple-img-container {
            width: 180px;
            height: 180px;
            margin: 0 auto 20px;
            border: 4px solid var(--gold);
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        .couple-img-container::after {
            content: '🌿'; /* עיטור עלי זית סמלי */
            position: absolute;
            bottom: -5px;
            width: 100%;
            font-size: 24px;
            text-align: center;
        }

        .couple-img { width: 100%; height: 100%; object-fit: cover; }

        .form-group { margin-bottom: 20px; text-align: right; }
        
        label { display: block; font-weight: bold; margin-bottom: 5px; color: var(--gold); }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Heebo';
        }

        .btn {
            background: var(--gold);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover { background: #6b510f; }

        .btn-secondary { background: var(--blue); }

        .payments {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .pay-link { text-decoration: none; font-size: 14px; color: var(--blue); font-weight: bold; }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="couple-img-container">
        <img src="couple.jpg" alt="מתן ופריאל" class="couple-img">
    </div>
    
    <h1>מתן & פריאל</h1>
    <p>28.06.2026 | ירושלים</p>

    <div id="loading">טוען פרטים...</div>

    <div id="rsvp-form" style="display: none;">
        <h2 id="guest-name">שלום</h2>
        <div class="form-group">
            <label>האם תגיעו?</label>
            <select id="attendance">
                <option value="coming">מגיע/ה בשמחה</option>
                <option value="not_coming">לא אוכל להגיע</option>
            </select>
        </div>
        <div class="form-group">
            <label>כמות אורחים (כולל אותך):</label>
            <input type="number" id="guest-count" min="1" max="10" value="1">
        </div>
        <button class="btn" onclick="submitRsvp()">אישור הגעה</button>

        <hr style="margin: 30px 0; border: 0.5px solid var(--cream);">

        <div class="form-group">
            <label>יש לכם שאלה?</label>
            <textarea id="question-text" rows="3" placeholder="כתבו לנו כאן..."></textarea>
            <button class="btn btn-secondary" onclick="sendQuestion()">שלח שאלה</button>
        </div>

        <div class="payments">
            <a href="https://bit.ly/your-bit" class="pay-link">מתנה ב-Bit ➔</a>
            <a href="https://payboxapp.page.link/your-link" class="pay-link">מתנה ב-Paybox ➔</a>
        </div>
    </div>
</div>

<script>
    const SB_URL = "https://zuohyggfphbgntlqyofa.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp1b2h5Z2dmcGhiZ250bHF5b2ZhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MTA0MzQsImV4cCI6MjA5MjI4NjQzNH0.eveHZ8qFzR34Wr1m2OGkIKtpEG6PXfffVTXDsercnHs";
    const supabase = supabase.createClient(SB_URL, SB_KEY);

    let guestToken = new URLSearchParams(window.location.search).get('t');

    async function init() {
        if (!guestToken) {
            document.getElementById('loading').innerText = "אופס! נראה שהקישור לא תקין.";
            return;
        }

        const { data, error } = await supabase
            .from('guests')
            .select('full_name, phone')
            .eq('token', guestToken)
            .single();

        if (error || !data) {
            document.getElementById('loading').innerText = "אורח לא נמצא במערכת.";
        } else {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('rsvp-form').style.display = 'block';
            document.getElementById('guest-name').innerText = `שלום, ${data.full_name}`;
        }
    }

    async function submitRsvp() {
        const status = document.getElementById('attendance').value;
        const count = document.getElementById('guest-count').value;

        const { error } = await supabase
            .from('guests')
            .update({ status: status, guest_count: count })
            .eq('token', guestToken);

        if (error) alert("שגיאה בעדכון ה-RSVP");
        else alert("תודה! הפרטים עודכנו בהצלחה.");
    }

    async function sendQuestion() {
        const text = document.getElementById('question-text').value;
        if (!text) return;

        const { error } = await supabase
            .from('questions')
            .insert([{ token: guestToken, question: text }]);

        if (error) alert("שגיאה בשליחת השאלה");
        else {
            alert("השאלה נשלחה בהצלחה!");
            document.getElementById('question-text').value = '';
        }
    }

    init();
</script>

</body>
</html>
